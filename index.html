<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Times 2024/25</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2dfd8;
    --text: #1a1a1a;
    --muted: #8a8780;
    --small: #16a34a;
    --small-dim: rgba(22,163,74,0.1);
    --medium: #ea6c0a;
    --medium-dim: rgba(234,108,10,0.1);
    --large: #dc2626;
    --large-dim: rgba(220,38,38,0.1);
    --p50: #7c3aed;
    --p85: #2563eb;
    --p95: #db2777;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 40px 36px;
  }

  header { margin-bottom: 36px; }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(26px, 4vw, 42px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }

  h1 span { color: var(--muted); font-weight: 700; }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-top: 10px;
    font-weight: 300;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }

  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    align-items: center;
    margin-bottom: 16px;
  }

  .legend { display: flex; gap: 10px; flex-wrap: wrap; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: all 0.18s;
    color: var(--text);
  }
  .legend-item:hover { border-color: var(--muted); }
  .legend-item.inactive { opacity: 0.35; }

  .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

  .pct-legend {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    margin-left: auto;
    align-items: center;
  }

  .pct-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .pct-line { width: 24px; height: 2px; border-radius: 1px; }
  .p50-line { background: var(--p50); }
  .p85-line { background: var(--p85); }
  .p95-line { background: transparent; border-top: 2px dashed var(--p95); }

  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 28px 20px;
  }

  .chart-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  svg text { font-family: 'DM Mono', monospace; }

  .tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.12s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    min-width: 110px;
  }
  .tooltip.visible { opacity: 1; }
  .tt-date { color: var(--muted); font-size: 11px; margin-bottom: 2px; font-family: 'DM Mono', monospace; }
  .tt-size { font-size: 11px; margin-bottom: 3px; font-family: 'DM Sans', sans-serif; font-weight: 500; }
  .tt-val  { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; line-height: 1; }
  .tt-days { color: var(--muted); font-size: 11px; margin-top: 1px; }

  footer {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 20px;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Delivery Analytics</div>
  <h1>Lead Times <span>2024/25</span></h1>
  <p class="subtitle">36 completed items · cycle time in days</p>
</header>

<div class="stats-row" id="statsRow"></div>

<div class="toolbar">
  <div class="legend">
    <div class="legend-item" data-size="S" onclick="toggleSize('S')">
      <div class="legend-dot" style="background:var(--small)"></div> Small
    </div>
    <div class="legend-item" data-size="M" onclick="toggleSize('M')">
      <div class="legend-dot" style="background:var(--medium)"></div> Medium
    </div>
    <div class="legend-item" data-size="L" onclick="toggleSize('L')">
      <div class="legend-dot" style="background:var(--large)"></div> Large
    </div>
  </div>
  <div class="pct-legend">
    <div class="pct-item"><div class="pct-line p50-line"></div> P50</div>
    <div class="pct-item"><div class="pct-line p85-line"></div> P85</div>
    <div class="pct-item"><div class="pct-line p95-line"></div> P95</div>
  </div>
</div>

<div class="chart-wrap">
  <div class="chart-title">Lead time by completion date</div>
  <svg id="chart" width="100%" style="display:block"></svg>
</div>

<footer>lead_times_2024_25</footer>

<div class="tooltip" id="tooltip">
  <div class="tt-date" id="tt-date"></div>
  <div class="tt-size" id="tt-size"></div>
  <div class="tt-val"  id="tt-val"></div>
  <div class="tt-days">days</div>
</div>

<script>
const RAW = [
  {date:"15 Lipca 2024",size:"S",days:49},
  {date:"22 Sierpnia 2024",size:"S",days:48},
  {date:"10 Września 2024",size:"S",days:87},
  {date:"25 Września 2024",size:"M",days:57},
  {date:"5 Października 2024",size:"M",days:148},
  {date:"14 Października 2024",size:"S",days:53},
  {date:"28 Października 2024",size:"S",days:45},
  {date:"18 Listopada 2024",size:"M",days:145},
  {date:"4 Grudnia 2024",size:"L",days:105},
  {date:"8 Stycznia 2025",size:"S",days:5},
  {date:"20 Stycznia 2025",size:"L",days:163},
  {date:"14 Lutego 2025",size:"S",days:43},
  {date:"26 Lutego 2025",size:"M",days:415},
  {date:"15 Marca 2025",size:"L",days:123},
  {date:"10 Kwietnia 2025",size:"M",days:103},
  {date:"5 Maja 2025",size:"L",days:104},
  {date:"12 Czerwca 2025",size:"L",days:302},
  {date:"25 Czerwca 2025",size:"L",days:158},
  {date:"2 Lipca 2025",size:"L",days:98},
  {date:"11 Lipca 2025",size:"S",days:52},
  {date:"18 Lipca 2025",size:"M",days:95},
  {date:"29 Lipca 2025",size:"S",days:70},
  {date:"3 Sierpnia 2025",size:"M",days:95},
  {date:"14 Sierpnia 2025",size:"M",days:101},
  {date:"21 Sierpnia 2025",size:"M",days:57},
  {date:"29 Sierpnia 2025",size:"M",days:57},
  {date:"8 Września 2025",size:"S",days:53},
  {date:"22 Września 2025",size:"L",days:137},
  {date:"4 Października 2025",size:"S",days:73},
  {date:"12 Października 2025",size:"M",days:60},
  {date:"19 Października 2025",size:"S",days:126},
  {date:"27 Października 2025",size:"M",days:57},
  {date:"5 Listopada 2025",size:"L",days:124},
  {date:"15 Listopada 2025",size:"M",days:75},
  {date:"25 Listopada 2025",size:"M",days:89},
  {date:"10 Grudnia 2025",size:"S",days:44},
];

const MONTHS = {
  'Stycznia':0,'Lutego':1,'Marca':2,'Kwietnia':3,'Maja':4,'Czerwca':5,
  'Lipca':6,'Sierpnia':7,'Września':8,'Października':9,'Listopada':10,'Grudnia':11
};

const COLOR = {S:'#16a34a', M:'#ea6c0a', L:'#dc2626'};
const LABEL = {S:'Small', M:'Medium', L:'Large'};

const data = RAW.map(d => ({
  ...d,
  dateObj: (() => { const p=d.date.trim().split(' '); return new Date(+p[2], MONTHS[p[1]], +p[0]); })()
})).sort((a,b)=>a.dateObj-b.dateObj);

window.RAW_DATA = data;
let active = {S:true, M:true, L:true};

function percentile(arr, p) {
  const s = [...arr].sort((a,b)=>a-b);
  const i = (p/100)*(s.length-1);
  const lo = Math.floor(i), hi = Math.ceil(i);
  return s[lo] + (i-lo)*(s[hi]-s[lo]);
}

function allP() {
  const v = data.map(d=>d.days);
  return { p50:percentile(v,50), p85:percentile(v,85), p95:percentile(v,95) };
}

// Stats
function renderStats() {
  const {p50,p85,p95} = allP();
  const avg = (data.reduce((s,d)=>s+d.days,0)/data.length).toFixed(0);
  const maxVal = Math.max(...data.map(d=>d.days));
  const cards = [
    {label:'Total items',   value:data.length,          sub:'across all sizes'},
    {label:'P50 · Median',  value:Math.round(p50)+'d',  sub:'all items'},
    {label:'P85',           value:Math.round(p85)+'d',  sub:'all items'},
    {label:'P95',           value:Math.round(p95)+'d',  sub:'all items'},
    {label:'Avg lead time', value:avg+'d',               sub:'arithmetic mean'},
    {label:'Max lead time', value:maxVal+'d',            sub:data.find(d=>d.days===maxVal).date},
  ];
  document.getElementById('statsRow').innerHTML = cards.map(c=>`
    <div class="stat-card">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-sub">${c.sub}</div>
    </div>`).join('');
}

// Tooltip
const tip = document.getElementById('tooltip');
function showTip(e, d) {
  tip.classList.add('visible');
  document.getElementById('tt-date').textContent = d.date;
  document.getElementById('tt-size').textContent = LABEL[d.size];
  document.getElementById('tt-size').style.color = COLOR[d.size];
  document.getElementById('tt-val').textContent = d.days;
  document.getElementById('tt-val').style.color = COLOR[d.size];
  moveTip(e);
}
function moveTip(e) {
  tip.style.left = (e.clientX+16)+'px';
  tip.style.top  = (e.clientY-50)+'px';
}
function hideTip() { tip.classList.remove('visible'); }

// Chart
function renderChart() {
  const svg  = document.getElementById('chart');
  const W    = svg.parentElement.offsetWidth - 56;
  const H    = 420;
  const PAD  = {top:16, right:72, bottom:44, left:48};
  const IW   = W - PAD.left - PAD.right;
  const IH   = H - PAD.top  - PAD.bottom;

  const maxDays  = Math.max(...data.map(d=>d.days));
  const minDate  = data[0].dateObj;
  const maxDate  = data[data.length-1].dateObj;
  const span     = maxDate - minDate;

  const xD = d  => PAD.left + ((d.dateObj - minDate) / span) * IW;
  const xT = ts => PAD.left + ((ts - minDate) / span) * IW;
  const yV = v  => PAD.top  + IH - (v / maxDays) * IH;

  // Y grid
  let grid = '';
  [0, 50, 100, 150, 200, 250, 300, 350, 400].forEach(v => {
    if(yV(v) < PAD.top - 2) return;
    grid += `<line x1="${PAD.left}" x2="${PAD.left+IW}" y1="${yV(v)}" y2="${yV(v)}"
      stroke="#ece9e2" stroke-width="1"/>`;
    grid += `<text x="${PAD.left-6}" y="${yV(v)+4}" fill="#b0ada6" font-size="10"
      text-anchor="end">${v}</text>`;
  });

  // X axis
  const mL = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let xAxis = `<line x1="${PAD.left}" x2="${PAD.left+IW}" y1="${PAD.top+IH}" y2="${PAD.top+IH}"
    stroke="#d0cdc6" stroke-width="1"/>`;
  let d = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  while(d <= maxDate) {
    const x = xT(d);
    if(x >= PAD.left-2 && x <= PAD.left+IW+2) {
      xAxis += `<line x1="${x}" x2="${x}" y1="${PAD.top+IH}" y2="${PAD.top+IH+5}"
        stroke="#c0bdb6" stroke-width="1"/>`;
      xAxis += `<text x="${x}" y="${PAD.top+IH+17}" fill="#a09d96" font-size="10"
        text-anchor="middle">${mL[d.getMonth()]} '${String(d.getFullYear()).slice(2)}</text>`;
    }
    d = new Date(d.getFullYear(), d.getMonth()+2, 1);
  }

  // Percentile lines
  const {p50,p85,p95} = allP();
  const pDefs = [
    {val:p50, color:'#7c3aed', dash:'',    label:'P50'},
    {val:p85, color:'#2563eb', dash:'',    label:'P85'},
    {val:p95, color:'#db2777', dash:'5,3', label:'P95'},
  ];
  let pLines = '';
  pDefs.forEach(pl => {
    const y  = yV(pl.val);
    const da = pl.dash ? `stroke-dasharray="${pl.dash}"` : '';
    pLines += `
      <line x1="${PAD.left}" x2="${PAD.left+IW}" y1="${y}" y2="${y}"
        stroke="${pl.color}" stroke-width="1.5" ${da} opacity="0.65"/>
      <rect x="${PAD.left+IW+4}" y="${y-9}" width="62" height="18" rx="4"
        fill="${pl.color}" opacity="0.1"/>
      <text x="${PAD.left+IW+8}" y="${y+4}" fill="${pl.color}" font-size="10.5"
        font-weight="500">${pl.label} ${Math.round(pl.val)}d</text>
    `;
  });

  // Dots
  let dots = '';
  data.forEach(item => {
    if(!active[item.size]) return;
    const cx  = xD(item);
    const cy  = yV(item.days);
    const idx = data.indexOf(item);
    dots += `
      <circle cx="${cx}" cy="${cy}" r="6.5"
        fill="${COLOR[item.size]}" opacity="0.80"
        stroke="white" stroke-width="1.5"
        style="cursor:pointer;transition:r 0.1s,opacity 0.1s"
        onmouseenter="this.setAttribute('r','8.5');this.style.opacity='1';showTip(event,RAW_DATA[${idx}])"
        onmousemove="moveTip(event)"
        onmouseleave="this.setAttribute('r','6.5');this.style.opacity='0.80';hideTip()"
      />`;
  });

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('height', H);
  svg.innerHTML = grid + xAxis + pLines + dots;
}

function toggleSize(s) {
  active[s] = !active[s];
  document.querySelector(`.legend-item[data-size="${s}"]`).classList.toggle('inactive', !active[s]);
  renderChart();
}

renderStats();
renderChart();
window.addEventListener('resize', renderChart);
</script>
</body>
</html>
