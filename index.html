<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Times 2024/25</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2dfd8;
    --text: #1a1a1a;
    --muted: #8a8780;
    --small: #16a34a;
    --medium: #ea6c0a;
    --large: #dc2626;
    --p50: #7c3aed;
    --p85: #2563eb;
    --p95: #db2777;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 40px 36px;
  }

  header { margin-bottom: 32px; }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 4vw, 40px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }
  h1 span { color: var(--muted); font-weight: 700; }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    font-weight: 300;
  }

  /* ── Stats ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 9px;
    margin-bottom: 22px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
  }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* ── Toolbars ── */
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
  }
  .toolbar-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Size pills */
  .size-filters { display: flex; gap: 7px; align-items: center; }
  .size-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; cursor: pointer; user-select: none;
    padding: 5px 13px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--surface); color: var(--text);
    transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .size-btn:hover { border-color: var(--muted); }
  .size-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .size-btn.off { opacity: 0.30; }
  .size-btn.solo { font-weight: 700; }

  /* Month range slider */
  .range-wrap { display: flex; gap: 10px; align-items: center; }
  .month-pills { display: flex; gap: 5px; flex-wrap: wrap; }
  .month-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .month-pill:hover { border-color: var(--muted); color: var(--text); }
  .month-pill.active {
    background: var(--text);
    color: var(--surface);
    border-color: var(--text);
    font-weight: 500;
  }
  .month-pill.all-pill.active {
    background: var(--muted);
    border-color: var(--muted);
  }

  /* Percentile legend */
  .pct-legend { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-left: auto; }
  .pct-item { display: flex; align-items: center; gap: 7px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .pct-line { width: 22px; height: 2px; border-radius: 1px; }
  .p50-line { background: var(--p50); }
  .p85-line { background: var(--p85); }
  .p95-line { background: transparent; border-top: 2px dashed var(--p95); }

  /* ── Banners ── */
  .banner {
    display: none; align-items: center; gap: 12px;
    border-radius: 10px; padding: 9px 16px; margin-bottom: 12px; font-size: 13px;
  }
  .banner.visible { display: flex; }
  .banner-restore { background: #fefce8; border: 1px solid #fde68a; color: #92400e; }
  .banner-range   { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
  .banner-btn {
    margin-left: auto; font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.06em; cursor: pointer; padding: 4px 12px; border-radius: 14px;
    background: white; transition: background 0.15s; white-space: nowrap;
  }
  .banner-restore .banner-btn { border: 1px solid #fbbf24; color: #92400e; }
  .banner-restore .banner-btn:hover { background: #fef9c3; }

  /* ── Chart ── */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 24px 18px;
    position: relative;
    margin-bottom: 16px;
  }
  .chart-title {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 18px;
  }
  svg text { font-family: 'DM Mono', monospace; }

  /* ── Add point panel ── */
  .add-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
  }
  .add-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0;
  }
  .add-panel-title {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }
  .add-toggle-btn {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.06em; cursor: pointer; padding: 4px 13px;
    border-radius: 14px; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    transition: all 0.15s;
  }
  .add-toggle-btn:hover { border-color: var(--text); color: var(--text); }
  .add-toggle-btn.open { background: var(--text); color: white; border-color: var(--text); }

  .add-form {
    display: none;
    margin-top: 18px;
    gap: 14px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .add-form.open { display: flex; }

  .form-field { display: flex; flex-direction: column; gap: 5px; }
  .form-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  }
  .form-input {
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 7px 11px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--text); background: white; }
  .form-input::placeholder { color: var(--muted); }

  .size-radio-group { display: flex; gap: 7px; }
  .size-radio {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; cursor: pointer; padding: 6px 12px;
    border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); transition: all 0.15s; user-select: none;
  }
  .size-radio:hover { border-color: var(--muted); }
  .size-radio input { display: none; }
  .size-radio.checked { background: white; font-weight: 600; }
  .size-radio.checked-S { border-color: var(--small); color: var(--small); }
  .size-radio.checked-M { border-color: var(--medium); color: var(--medium); }
  .size-radio.checked-L { border-color: var(--large); color: var(--large); }

  .add-btn {
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    padding: 7px 20px; border-radius: 8px;
    border: none; background: var(--text); color: white;
    cursor: pointer; transition: opacity 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.82; }
  .add-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .form-err {
    font-size: 12px; color: var(--large);
    font-family: 'DM Mono', monospace;
    display: none;
  }
  .form-err.show { display: block; }

  /* ── Tooltip ── */
  .tooltip {
    position: fixed; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; pointer-events: none;
    z-index: 100; opacity: 0; transition: opacity 0.12s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10); min-width: 130px; max-width: 220px;
  }
  .tooltip.visible { opacity: 1; }
  .tt-date  { color: var(--muted); font-size: 11px; margin-bottom: 2px; font-family: 'DM Mono', monospace; }
  .tt-size  { font-size: 11px; margin-bottom: 3px; font-weight: 500; }
  .tt-val   { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; line-height: 1; }
  .tt-days  { color: var(--muted); font-size: 11px; margin-top: 1px; }
  .tt-comment { color: var(--text); font-size: 12px; margin-top: 7px; padding-top: 6px; border-top: 1px solid var(--border); line-height: 1.4; }
  .tt-hint  { color: var(--muted); font-size: 10px; margin-top: 6px; padding-top: 5px; border-top: 1px solid var(--border); font-family: 'DM Mono', monospace; }

  footer {
    text-align: center; font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted); margin-top: 20px; letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Delivery Analytics</div>
  <h1>Lead Times <span>2024/25</span></h1>
  <p class="subtitle" id="subtitle">— items · cycle time in days</p>
</header>

<div class="stats-row" id="statsRow"></div>

<!-- ── Toolbar row 1: size + months + legend ── -->
<div class="toolbar">
  <!-- Size -->
  <div class="size-filters">
    <span class="filter-label">Size</span>
    <button class="size-btn" id="btn-S" onclick="toggleSize('S')">
      <span class="dot" style="background:var(--small)"></span>Small
    </button>
    <button class="size-btn" id="btn-M" onclick="toggleSize('M')">
      <span class="dot" style="background:var(--medium)"></span>Medium
    </button>
    <button class="size-btn" id="btn-L" onclick="toggleSize('L')">
      <span class="dot" style="background:var(--large)"></span>Large
    </button>
  </div>

  <div class="toolbar-sep"></div>

  <!-- Month range -->
  <div class="range-wrap">
    <span class="filter-label">Last</span>
    <div class="month-pills" id="monthPills"></div>
  </div>

  <div class="toolbar-sep"></div>

  <!-- Percentile legend -->
  <div class="pct-legend" id="pctLegend"></div>
</div>

<!-- ── Restore banner ── -->
<div class="banner banner-restore" id="restoreBar">
  <span id="restoreText">— items removed</span>
  <button class="banner-btn" onclick="restoreAll()">Restore all</button>
</div>

<!-- ── Chart ── -->
<div class="chart-wrap">
  <div class="chart-title" id="chartTitle">Lead time by completion date</div>
  <svg id="chart" width="100%" style="display:block"></svg>
</div>

<!-- ── Add data point panel ── -->
<div class="add-panel">
  <div class="add-panel-header">
    <span class="add-panel-title">Add data point</span>
    <button class="add-toggle-btn" id="addToggleBtn" onclick="toggleAddForm()">+ Add</button>
  </div>
  <div class="add-form" id="addForm">
    <div class="form-field">
      <label class="form-label">End date</label>
      <input class="form-input" type="date" id="f-date" style="width:160px">
    </div>
    <div class="form-field">
      <label class="form-label">Lead time (days)</label>
      <input class="form-input" type="number" id="f-days" min="1" max="9999" placeholder="e.g. 42" style="width:120px">
    </div>
    <div class="form-field">
      <label class="form-label">Size</label>
      <div class="size-radio-group" id="sizeRadioGroup">
        <label class="size-radio" id="sr-S" onclick="selectSize('S')">
          <input type="radio" name="fsize" value="S"> S
        </label>
        <label class="size-radio" id="sr-M" onclick="selectSize('M')">
          <input type="radio" name="fsize" value="M"> M
        </label>
        <label class="size-radio" id="sr-L" onclick="selectSize('L')">
          <input type="radio" name="fsize" value="L"> L
        </label>
      </div>
    </div>
    <div class="form-field" style="flex:1;min-width:180px">
      <label class="form-label">Comment (optional)</label>
      <input class="form-input" type="text" id="f-comment" placeholder="e.g. blocked by dependency" style="width:100%">
    </div>
    <div class="form-field" style="padding-bottom:1px">
      <button class="add-btn" id="addBtn" onclick="addPoint()">Add point</button>
    </div>
  </div>
  <div class="form-err" id="formErr"></div>
</div>

<footer>lead_times_2024_25</footer>

<div class="tooltip" id="tooltip">
  <div class="tt-date"    id="tt-date"></div>
  <div class="tt-size"    id="tt-size"></div>
  <div class="tt-val"     id="tt-val"></div>
  <div class="tt-days">days</div>
  <div class="tt-comment" id="tt-comment" style="display:none"></div>
  <div class="tt-hint">click to remove</div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════════════ */
const MONTHS_PL = {
  'Stycznia':0,'Lutego':1,'Marca':2,'Kwietnia':3,'Maja':4,'Czerwca':5,
  'Lipca':6,'Sierpnia':7,'Września':8,'Października':9,'Listopada':10,'Grudnia':11
};
const COLOR = {S:'#16a34a', M:'#ea6c0a', L:'#dc2626'};
const LABEL = {S:'Small', M:'Medium', L:'Large'};

function parsePL(s) {
  const p = s.trim().split(' ');
  return new Date(+p[2], MONTHS_PL[p[1]], +p[0]);
}
function parseISO(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtDate(dt) {
  const mL = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${dt.getDate()} ${mL[dt.getMonth()]} ${dt.getFullYear()}`;
}

let nextId = 100;
const BASE = [
  {date:"15 Lipca 2024",size:"S",days:49},
  {date:"22 Sierpnia 2024",size:"S",days:48},
  {date:"10 Września 2024",size:"S",days:87},
  {date:"25 Września 2024",size:"M",days:57},
  {date:"5 Października 2024",size:"M",days:148},
  {date:"14 Października 2024",size:"S",days:53},
  {date:"28 Października 2024",size:"S",days:45},
  {date:"18 Listopada 2024",size:"M",days:145},
  {date:"4 Grudnia 2024",size:"L",days:105},
  {date:"8 Stycznia 2025",size:"S",days:5},
  {date:"20 Stycznia 2025",size:"L",days:163},
  {date:"14 Lutego 2025",size:"S",days:43},
  {date:"26 Lutego 2025",size:"M",days:415},
  {date:"15 Marca 2025",size:"L",days:123},
  {date:"10 Kwietnia 2025",size:"M",days:103},
  {date:"5 Maja 2025",size:"L",days:104},
  {date:"12 Czerwca 2025",size:"L",days:302},
  {date:"25 Czerwca 2025",size:"L",days:158},
  {date:"2 Lipca 2025",size:"L",days:98},
  {date:"11 Lipca 2025",size:"S",days:52},
  {date:"18 Lipca 2025",size:"M",days:95},
  {date:"29 Lipca 2025",size:"S",days:70},
  {date:"3 Sierpnia 2025",size:"M",days:95},
  {date:"14 Sierpnia 2025",size:"M",days:101},
  {date:"21 Sierpnia 2025",size:"M",days:57},
  {date:"29 Sierpnia 2025",size:"M",days:57},
  {date:"8 Września 2025",size:"S",days:53},
  {date:"22 Września 2025",size:"L",days:137},
  {date:"4 Października 2025",size:"S",days:73},
  {date:"12 Października 2025",size:"M",days:60},
  {date:"19 Października 2025",size:"S",days:126},
  {date:"27 Października 2025",size:"M",days:57},
  {date:"5 Listopada 2025",size:"L",days:124},
  {date:"15 Listopada 2025",size:"M",days:75},
  {date:"25 Listopada 2025",size:"M",days:89},
  {date:"10 Grudnia 2025",size:"S",days:44},
].map((d,i) => ({...d, id:i, dateObj:parsePL(d.date), isNew:false, comment:''}));

let data = [...BASE]; // mutable, may grow

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
let active   = {S:true, M:true, L:true};
let removed  = new Set();
let monthFilter = 0;      // 0 = all; N = last N months
let formSize = null;
let addFormOpen = false;

const MONTH_OPTIONS = [3, 4, 6, 9, 12];

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
function percentile(arr, p) {
  if(!arr.length) return 0;
  const s = [...arr].sort((a,b)=>a-b);
  const i = (p/100)*(s.length-1);
  const lo = Math.floor(i), hi = Math.ceil(i);
  return s[lo] + (i-lo)*(s[hi]-s[lo]);
}

function activeSizes() { return ['S','M','L'].filter(s=>active[s]); }
function soloSize()    { const a=activeSizes(); return a.length===1 ? a[0] : null; }

function rangeThreshold() {
  if(!monthFilter) return null;
  const maxDate = data.reduce((m,d)=>d.dateObj>m?d.dateObj:m, data[0].dateObj);
  const t = new Date(maxDate);
  t.setMonth(t.getMonth() - monthFilter);
  return t;
}

function visibleData() {
  const thresh = rangeThreshold();
  return data.filter(d =>
    active[d.size] &&
    !removed.has(d.id) &&
    (!thresh || d.dateObj >= thresh)
  );
}

// Data used for percentile calculation (respects range + removed, but shows ALL sizes for context)
function percData() {
  return visibleData();
}

/* ═══════════════════════════════════════════════════════════
   MONTH PILLS
═══════════════════════════════════════════════════════════ */
function buildMonthPills() {
  const el = document.getElementById('monthPills');
  const opts = [{label:'All', val:0}, ...MONTH_OPTIONS.map(m=>({label:m+'mo', val:m}))];
  el.innerHTML = opts.map(o=>`
    <div class="month-pill ${o.val===0?'all-pill':''} ${monthFilter===o.val?'active':''}"
      onclick="setMonthFilter(${o.val})">${o.label}</div>
  `).join('');
}

function setMonthFilter(m) {
  monthFilter = m;
  buildMonthPills();
  refreshAll();
}

/* ═══════════════════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════════════════ */
function renderStats() {
  const vis  = visibleData();
  const solo = soloSize();
  const vals = vis.map(d=>d.days);

  let cards;
  if(solo) {
    const p85 = vals.length ? percentile(vals,85) : 0;
    const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(0) : '–';
    const max = vals.length ? Math.max(...vals) : 0;
    cards = [
      {label:`Items (${LABEL[solo]})`, value:vis.length,         sub:monthFilter?`last ${monthFilter} months`:'all time'},
      {label:`P85 · ${LABEL[solo]}`,   value:Math.round(p85)+'d', sub:'85th percentile', accent:COLOR[solo]},
      {label:'Avg lead time',           value:avg+'d',             sub:'arithmetic mean'},
      {label:'Max lead time',           value:max+'d',             sub:vals.length?vis.find(d=>d.days===max)?.date||'':'–'},
    ];
  } else {
    const p50 = vals.length ? percentile(vals,50) : 0;
    const p85 = vals.length ? percentile(vals,85) : 0;
    const p95 = vals.length ? percentile(vals,95) : 0;
    const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(0) : '–';
    const max = vals.length ? Math.max(...vals) : 0;
    cards = [
      {label:'Total items',  value:vis.length,          sub:monthFilter?`last ${monthFilter} months`:'all time'},
      {label:'P50 · Median', value:Math.round(p50)+'d', sub:'visible items'},
      {label:'P85',          value:Math.round(p85)+'d', sub:'visible items'},
      {label:'P95',          value:Math.round(p95)+'d', sub:'visible items'},
      {label:'Avg',          value:avg+'d',              sub:'arithmetic mean'},
      {label:'Max',          value:max+'d',              sub:vals.length?vis.find(d=>d.days===max)?.date||'':'–'},
    ];
  }

  document.getElementById('statsRow').innerHTML = cards.map(c=>`
    <div class="stat-card">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value" style="${c.accent?'color:'+c.accent:''}">${c.value}</div>
      <div class="stat-sub">${c.sub}</div>
    </div>`).join('');
}

/* ═══════════════════════════════════════════════════════════
   PCT LEGEND
═══════════════════════════════════════════════════════════ */
function renderPctLegend() {
  const solo = soloSize();
  const el   = document.getElementById('pctLegend');
  if(solo) {
    el.innerHTML = `<div class="pct-item">
      <div class="pct-line" style="background:${COLOR[solo]}"></div>P85 · ${LABEL[solo]}</div>`;
  } else {
    el.innerHTML = `
      <div class="pct-item"><div class="pct-line p50-line"></div>P50</div>
      <div class="pct-item"><div class="pct-line p85-line"></div>P85</div>
      <div class="pct-item"><div class="pct-line p95-line"></div>P95</div>`;
  }
}

/* ═══════════════════════════════════════════════════════════
   BUTTONS & SUBTITLE
═══════════════════════════════════════════════════════════ */
function refreshButtons() {
  const solo = soloSize();
  ['S','M','L'].forEach(s => {
    const btn = document.getElementById('btn-'+s);
    btn.classList.toggle('off',  !active[s]);
    btn.classList.toggle('solo', !!solo && active[s] && solo===s);
    if(active[s] && solo===s) {
      btn.style.color = COLOR[s]; btn.style.borderColor = COLOR[s];
    } else {
      btn.style.color = ''; btn.style.borderColor = '';
    }
  });
}

function refreshSubtitle() {
  const vis  = visibleData();
  const solo = soloSize();
  const rangeLabel = monthFilter ? ` · last ${monthFilter} months` : '';
  const sizeLabel  = solo ? ` · ${LABEL[solo]} only` : '';
  document.getElementById('subtitle').textContent =
    `${vis.length} of ${data.length} items visible${sizeLabel}${rangeLabel} · cycle time in days`;
}

/* ═══════════════════════════════════════════════════════════
   RESTORE BAR
═══════════════════════════════════════════════════════════ */
function refreshRestoreBar() {
  const bar = document.getElementById('restoreBar');
  if(!removed.size) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  document.getElementById('restoreText').textContent =
    `${removed.size} item${removed.size>1?'s':''} removed from chart`;
}
function restoreAll() { removed.clear(); refreshAll(); }

/* ═══════════════════════════════════════════════════════════
   CHART TITLE
═══════════════════════════════════════════════════════════ */
function refreshChartTitle() {
  const solo = soloSize();
  const rangeLabel = monthFilter ? ` · last ${monthFilter} months` : '';
  const sizeLabel  = solo ? ` · ${LABEL[solo]}` : '';
  document.getElementById('chartTitle').textContent =
    `Lead time by completion date${sizeLabel}${rangeLabel}`;
}

/* ═══════════════════════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════════════════════ */
const tip = document.getElementById('tooltip');

function showTip(e, d) {
  tip.classList.add('visible');
  document.getElementById('tt-date').textContent = fmtDate(d.dateObj);
  document.getElementById('tt-size').textContent = LABEL[d.size];
  document.getElementById('tt-size').style.color = COLOR[d.size];
  document.getElementById('tt-val').textContent  = d.days;
  document.getElementById('tt-val').style.color  = COLOR[d.size];
  const commentEl = document.getElementById('tt-comment');
  if(d.comment) {
    commentEl.textContent = d.comment;
    commentEl.style.display = 'block';
  } else {
    commentEl.style.display = 'none';
  }
  moveTip(e);
}
function moveTip(e) {
  const tx = e.clientX + 16;
  const ty = e.clientY - 60;
  tip.style.left = tx + 'px';
  tip.style.top  = ty + 'px';
}
function hideTip() { tip.classList.remove('visible'); }

/* ═══════════════════════════════════════════════════════════
   REMOVE DOT
═══════════════════════════════════════════════════════════ */
function removeDot(id) {
  hideTip();
  removed.add(id);
  refreshAll();
}

/* ═══════════════════════════════════════════════════════════
   CHART
═══════════════════════════════════════════════════════════ */
function renderChart() {
  const svg = document.getElementById('chart');
  const W   = svg.parentElement.offsetWidth - 48;
  const H   = 420;
  const PAD = {top:14, right:82, bottom:44, left:48};
  const IW  = W - PAD.left - PAD.right;
  const IH  = H - PAD.top  - PAD.bottom;

  // X domain: always show all data in x; y also all data for stable scale
  const allDays = data.map(d=>d.days);
  const maxDays = Math.max(...allDays);

  // For X axis, use filtered date range if monthFilter active
  const thresh   = rangeThreshold();
  const plotData = thresh ? data.filter(d=>d.dateObj>=thresh) : data;
  const sortedDates = [...plotData].sort((a,b)=>a.dateObj-b.dateObj);
  if(!sortedDates.length) { svg.innerHTML=''; return; }

  const minDate = sortedDates[0].dateObj;
  const maxDate = sortedDates[sortedDates.length-1].dateObj;
  const span    = Math.max(maxDate - minDate, 1);

  const xD = d  => PAD.left + ((d.dateObj - minDate) / span) * IW;
  const xT = ts => PAD.left + ((ts - minDate)         / span) * IW;
  const yV = v  => PAD.top  + IH - (v / maxDays) * IH;

  // Y grid
  let grid = '';
  [0,50,100,150,200,250,300,350,400].forEach(v => {
    if(yV(v) < PAD.top-2) return;
    grid += `<line x1="${PAD.left}" x2="${PAD.left+IW}" y1="${yV(v)}" y2="${yV(v)}"
      stroke="#ece9e2" stroke-width="1"/>`;
    grid += `<text x="${PAD.left-6}" y="${yV(v)+4}" fill="#b0ada6" font-size="10"
      text-anchor="end">${v}</text>`;
  });

  // X axis
  const mL = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let xAxis = `<line x1="${PAD.left}" x2="${PAD.left+IW}" y1="${PAD.top+IH}" y2="${PAD.top+IH}"
    stroke="#d0cdc6" stroke-width="1"/>`;
  let d = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  // Pick tick interval based on span in months
  const spanMonths = (maxDate - minDate) / (1000*60*60*24*30.44);
  const tickStep   = spanMonths <= 5 ? 1 : spanMonths <= 12 ? 2 : 3;
  while(d <= maxDate) {
    const x = xT(d);
    if(x >= PAD.left-2 && x <= PAD.left+IW+2) {
      xAxis += `<line x1="${x}" x2="${x}" y1="${PAD.top+IH}" y2="${PAD.top+IH+5}"
        stroke="#c0bdb6" stroke-width="1"/>`;
      xAxis += `<text x="${x}" y="${PAD.top+IH+17}" fill="#a09d96" font-size="10"
        text-anchor="middle">${mL[d.getMonth()]} '${String(d.getFullYear()).slice(2)}</text>`;
    }
    d = new Date(d.getFullYear(), d.getMonth()+tickStep, 1);
  }

  // Range shading: if monthFilter, shade the "in range" region
  let rangeBg = '';
  if(thresh) {
    const rx = xT(thresh);
    rangeBg += `<rect x="${PAD.left}" y="${PAD.top}" width="${IW}" height="${IH}"
      fill="#eff6ff" opacity="0.55"/>`;
  }

  // Percentile lines (computed from visibleData = range + active sizes + removed)
  const vis  = visibleData();
  const solo = soloSize();
  let pLines = '';

  const pVals = vis.map(d=>d.days);
  if(pVals.length) {
    if(solo) {
      const p85 = percentile(pVals,85);
      const y   = yV(p85);
      const col = COLOR[solo];
      pLines += `
        <line x1="${PAD.left}" x2="${PAD.left+IW}" y1="${y}" y2="${y}"
          stroke="${col}" stroke-width="2" opacity="0.7"/>
        <rect x="${PAD.left+IW+3}" y="${y-9}" width="74" height="18" rx="4" fill="${col}" opacity="0.1"/>
        <text x="${PAD.left+IW+7}" y="${y+4}" fill="${col}" font-size="10.5" font-weight="600">P85 ${Math.round(p85)}d</text>`;
    } else {
      const pDefs = [
        {val:percentile(pVals,50), color:'#7c3aed', dash:'',    label:'P50'},
        {val:percentile(pVals,85), color:'#2563eb', dash:'',    label:'P85'},
        {val:percentile(pVals,95), color:'#db2777', dash:'5,3', label:'P95'},
      ];
      pDefs.forEach(pl => {
        const y  = yV(pl.val);
        const da = pl.dash ? `stroke-dasharray="${pl.dash}"` : '';
        pLines += `
          <line x1="${PAD.left}" x2="${PAD.left+IW}" y1="${y}" y2="${y}"
            stroke="${pl.color}" stroke-width="1.5" ${da} opacity="0.65"/>
          <rect x="${PAD.left+IW+3}" y="${y-9}" width="74" height="18" rx="4" fill="${pl.color}" opacity="0.1"/>
          <text x="${PAD.left+IW+7}" y="${y+4}" fill="${pl.color}" font-size="10.5" font-weight="500">${pl.label} ${Math.round(pl.val)}d</text>`;
      });
    }
  }

  // Dots — only render dots in the visible date range
  let dots = '';

  // Ghost removed dots
  plotData.forEach(item => {
    if(!active[item.size] || !removed.has(item.id)) return;
    const cx = xD(item), cy = yV(item.days);
    dots += `<circle cx="${cx}" cy="${cy}" r="5" fill="#c8c5be" opacity="0.30"
      stroke="white" stroke-width="1" style="cursor:default"/>`;
  });

  // Active dots
  plotData.forEach(item => {
    if(!active[item.size] || removed.has(item.id)) return;
    const cx  = xD(item);
    const cy  = yV(item.days);
    const idx = data.indexOf(item);
    const isNew = item.isNew;
    // New points get a small star marker (diamond shape via extra outer ring)
    const ring = isNew
      ? `<circle cx="${cx}" cy="${cy}" r="9.5" fill="none" stroke="${COLOR[item.size]}" stroke-width="1" opacity="0.35" stroke-dasharray="3,2"/>`
      : '';
    dots += ring + `
      <circle cx="${cx}" cy="${cy}" r="6.5"
        fill="${COLOR[item.size]}" opacity="${isNew?'0.95':'0.82'}"
        stroke="white" stroke-width="${isNew?'2':'1.5'}"
        style="cursor:pointer;transition:r 0.1s,opacity 0.1s"
        onmouseenter="this.setAttribute('r','8.5');this.style.opacity='1';showTip(event,data[${idx}])"
        onmousemove="moveTip(event)"
        onmouseleave="this.setAttribute('r','6.5');this.style.opacity='${isNew?'0.95':'0.82'}';hideTip()"
        onclick="removeDot(${item.id})"
      />`;
  });

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('height', H);
  svg.innerHTML = rangeBg + grid + xAxis + pLines + dots;
}

/* ═══════════════════════════════════════════════════════════
   SIZE TOGGLE
═══════════════════════════════════════════════════════════ */
function toggleSize(s) {
  const currently = activeSizes();
  if(currently.length===1 && currently[0]===s) {
    active = {S:true, M:true, L:true};
  } else {
    active[s] = !active[s];
    if(activeSizes().length===0) active = {S:true, M:true, L:true};
  }
  refreshAll();
}

/* ═══════════════════════════════════════════════════════════
   ADD FORM
═══════════════════════════════════════════════════════════ */
function toggleAddForm() {
  addFormOpen = !addFormOpen;
  document.getElementById('addForm').classList.toggle('open', addFormOpen);
  document.getElementById('addToggleBtn').classList.toggle('open', addFormOpen);
  document.getElementById('addToggleBtn').textContent = addFormOpen ? '× Close' : '+ Add';
  document.getElementById('formErr').classList.remove('show');
}

function selectSize(s) {
  formSize = s;
  ['S','M','L'].forEach(x => {
    const el = document.getElementById('sr-'+x);
    el.classList.remove('checked','checked-S','checked-M','checked-L');
    if(x===s) { el.classList.add('checked','checked-'+s); }
  });
}

function addPoint() {
  const dateVal    = document.getElementById('f-date').value;
  const daysVal    = document.getElementById('f-days').value;
  const commentVal = document.getElementById('f-comment').value.trim();
  const errEl      = document.getElementById('formErr');

  if(!dateVal)   { showErr('Please pick an end date.'); return; }
  if(!daysVal || +daysVal < 1) { showErr('Enter a valid lead time (≥ 1 day).'); return; }
  if(!formSize)  { showErr('Please select a size (S / M / L).'); return; }

  errEl.classList.remove('show');

  const dateObj = parseISO(dateVal);
  const item = {
    id:      nextId++,
    date:    fmtDate(dateObj),
    dateObj,
    size:    formSize,
    days:    +daysVal,
    comment: commentVal,
    isNew:   true,
  };
  data.push(item);
  data.sort((a,b)=>a.dateObj-b.dateObj);

  // reset form
  document.getElementById('f-date').value    = '';
  document.getElementById('f-days').value    = '';
  document.getElementById('f-comment').value = '';
  selectSize(null);
  formSize = null;

  refreshAll();
}

function showErr(msg) {
  const el = document.getElementById('formErr');
  el.textContent = msg;
  el.classList.add('show');
}

/* ═══════════════════════════════════════════════════════════
   REFRESH ALL
═══════════════════════════════════════════════════════════ */
function refreshAll() {
  refreshButtons();
  renderPctLegend();
  renderStats();
  refreshChartTitle();
  renderChart();
  refreshRestoreBar();
  refreshSubtitle();
}

// init
buildMonthPills();
refreshAll();
window.addEventListener('resize', renderChart);
</script>
